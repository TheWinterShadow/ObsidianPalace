# nginx reverse proxy for SSL termination.
# Proxies HTTPS (443) → uvicorn (8080).
# Port 80 returns 301 redirect to HTTPS (except /.well-known/acme-challenge for certbot).

# Worker processes — auto-detect based on available CPUs.
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;

    # Timeouts tuned for SSE long-polling.
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_connect_timeout 10s;
    keepalive_timeout 65;

    # Buffer settings for SSE — disable buffering so events stream immediately.
    proxy_buffering off;
    proxy_cache off;

    # --- HTTP (port 80) ---
    # ACME challenge for certbot + redirect everything else to HTTPS.
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP to HTTPS.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS (port 443) ---
    server {
        listen 443 ssl;
        server_name _;

        # SSL certificates — mounted from host via Let's Encrypt.
        # These paths are populated by the COS startup script running certbot.
        ssl_certificate     /etc/letsencrypt/live/certs/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/certs/privkey.pem;

        # Modern TLS configuration.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # Health check — no auth required, proxied to uvicorn.
        location /health {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MCP Streamable HTTP endpoint (POST /mcp) — used by OpenCode and newer clients.
        # Exact match prevents nginx from adding a trailing slash and 301-redirecting,
        # which would convert POST to GET and break the MCP protocol.
        location = /mcp {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        # MCP SSE transport — keep connection open for streaming.
        # Handles /sse (EventSource) and /messages/ (POST).
        location /sse {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        location /messages/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        # All other routes (docs, openapi, etc.) — standard proxy.
        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
